      content: >2-

        [head=1]22.09.████[/head]

        Блэк Джэк мне дал день на то, чтобы собраться с мыслями. Я проснулся и увидел в шкафчике... КРОВЬ?! КАКОГО ЧЁРТА ОНА ТУТ? Я очень надеюсь, что это не моя...


        Также я обнаружил в шкафу ключ-карту научного сотрудника, но имя и фамилия держателя замазана.... Вероятнее всего, это моя ключ-карта. Единственное, что меня смущает, так это то, что вчера её тут не было и я не могу её подобрать...


        Перед началом игр Блэк Джэк сказал мне поставить что-то ценное на кон. У меня не было ничего такого ценного и я решил кое-что проверить: смогу ли я поставить СВОЮ душу, СВОЮ жизнь на кон? Я решил попробовать и...., он принял мою ставку.... Не знаю, хорошо это или нет, но я уже жалею о своём поступке....


        Это место явно аномальное и нужно понять, как эту аномалию сдержать. Может, я смогу вернуться обратно в учреждение и рассказать то, что я видел. Ладно.., время на размышления у меня ещё будут, а сейчас Блэк Джэк меня вызывает иг......
