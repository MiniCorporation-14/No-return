        Фух, наконец-то я закончил починку энергопитания нашего здания. Можно сходить в столовую, но начальник сказал, что если я выполню его лёгкую просьбу, то он выпишет мне премию. Ну и как же я мог отказать? 


        В общем, мне пришлось пойти [bold]заколотить[/bold] одну дверь. Честно, я сам не знаю, что за ней находится, но не зря же начальник сказал её заколотить? Может, там что-то то, что может репутацию нашу понизить? Ладно, я сейчас слишком слаб для мышления. Пора пойти в столовую к нашему Шеф-повару!
