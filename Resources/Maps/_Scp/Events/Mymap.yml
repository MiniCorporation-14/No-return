        КАКАЯ ЕЩЁ ИЗМЕНА ОРГАНИЗАЦИИ? Он же был очень добрым и великим человеком... Я сам знаю, сколько ему секретных дел доверяли и он всё выполнял. Что он такого сделал, чтобы поступил такой приказ? 


        Ещё меня смущает, что за день до приказа он приказал забаррикадировать металлическую дверь в командующем блоке.


        Ну не суть..., в общем, мне дали индивидуальную ключ-карту Начальника здания, чтобы я мог открыть его шкаф в случае чего. Я надеюсь, что мне никогда не придётся это сделать...
