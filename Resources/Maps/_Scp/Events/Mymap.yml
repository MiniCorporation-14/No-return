        [head=1]21.09.████[/head]

        Я появился в странной комнате с серебряным полом и стенами без вещей, но хотя бы в одежде... Я не помню своего имени, лишь то, что я работал на Участке-██ в Фонде SCP. Ко мне в комнату зашёл недавно странный человек в чёрном и представился [italic]Блэк Джэком[/italic]. Ха, странное имя, конечно. Хоть и не очень мне привычно, но как-то уютно в этой комнате...


        Блэк Джэк сказал, что я попал в его [bold]"игры"[/bold]. Он сказал, что будет всего 3 игры, но суть всех сразу он раскрывать не будет. Я ничего не понял... Я просто работал, работал и появился резко в каком-то непонятном здании! От фразы "Ты попал ко мне в игры" - мне уже как-то не по себе. В связи с тем, что я его первый участник, он мне сказал, что [bold]надо всё очень внимательно осматривать в каждой комнате, в которых я побываю.[/bold]


        Блэк Джэк походу очень богат, так как то серебрянные стены и двери тут, то золотые двери и стены. Странно, будто я попал в шоу какого-то миллиардера.
