- type: entity
  id: ScpBookshelfFilled
  parent:
  - ScpBaseBookshelfComponents
  - BookshelfFilled
  components:
  - type: EntityTableContainerFill
    containers:
      storagebase: !type:NestedSelector
        tableId: ScpBookshelfEntityTable

- type: entityTable
  id: ScpBookshelfEntityTable
  table: !type:AllSelector
    children:
    # Randomly generated books
    - id: BookRandomStory
      amount: !type:RangeNumberSelector
        range: 0, 5
    # Guidebooks
    - !type:NestedSelector
      rolls: !type:RangeNumberSelector
        range: 0, 2
      tableId: RandomGuidebookTable
    # Handwritten books
    - !type:NestedSelector
      rolls: !type:RangeNumberSelector
        range: 0, 3
      tableId: RandomHandwrittenBookTable
