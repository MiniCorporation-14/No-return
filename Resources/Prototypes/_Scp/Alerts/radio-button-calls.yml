- type: entity
  parent: SignalButton
  id: BaseRadioButtonCall
  abstract: true
  name: radio call button
  description: A button for calling assistance.
  components:
  - type: WallMount
    arc: 175
  - type: Construction
    graph: SignalButtonDirectionalGraph
    node: SignalButtonDirectionalNode
  - type: UseDelay
    delay: 1
    delays:
      RadioCall: !type:UseDelayInfo
        length: 5
  - type: ScpEchoExemptSounds
    exemptPaths:
    - /Audio/_Scp/Effects/Button/click.ogg

- type: entity
  parent: BaseRadioButtonCall
  id: BaseEmergencyRadioButtonCall
  abstract: true
  components:
  - type: Sprite
    drawdepth: SmallObjects
    sprite: _Scp/Structures/Wallmounts/Buttons/emergency_button.rsi
    layers:
    - map: [ "enum.EmergencyRadioButtonVisualLayers.Base" ]
    - map: [ "enum.LockVisualLayers.Lock" ]
      state: locked
  - type: Lock
  - type: LockVisuals
  - type: AccessReader
    access: [ [ "Research" ], [ "Security" ] ]
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.EmergencyRadioButtonVisuals.Pressed:
        enum.EmergencyRadioButtonVisualLayers.Base:
          True: { state: on }
          False: { state: off }
  - type: TriggerOnSignalSwitch
    keyOut: click
  - type: UpdateAppearanceOnTrigger
    keysIn: [ click ]
    key: enum.EmergencyRadioButtonVisuals.Pressed
    duration: 3
  - type: EmitSoundOnTrigger
    keysIn: [ click ]
    sound:
      path: /Audio/_Scp/Effects/Button/emergency_alarm.ogg
      params:
        maxDistance: 6
  - type: ScpEchoExemptSounds
    exemptPaths:
    - /Audio/_Scp/Effects/Button/click.ogg
    - /Audio/_Scp/Effects/Button/emergency_alarm.ogg
  - type: TTS
    voice: Brendan

- type: entity
  parent: BaseRadioButtonCall
  id: ButtonCallMedicalService
  name: medical service call button
  description: A button for calling medical service assistance.
  components:
