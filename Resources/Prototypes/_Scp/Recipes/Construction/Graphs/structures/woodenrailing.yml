- type: constructionGraph
  id: ScpRailingWood
  start: start
  graph:
    - node: start
      edges:
        - to: railing
          completed:
            - !type:SnapToGrid { }
          steps:
            - material: WoodPlank
              amount: 1
              doAfter: 2
        - to: railingCorner
          completed:
            - !type:SnapToGrid { }
          steps:
            - material: WoodPlank
              amount: 2
              doAfter: 2.5
        - to: railingCornerSmall
          completed:
            - !type:SnapToGrid { }
          steps:
            - material: WoodPlank
              amount: 1
              doAfter: 2
        - to: railingRound
          completed:
            - !type:SnapToGrid { }
          steps:
            - material: WoodPlank
              amount: 2
              doAfter: 2

    - node: railing
      entity: ScpRailingWood
      edges:
        - to: start
          completed:
            - !type:SpawnPrototype
              prototype: ScpMaterialWoodPlank1
              amount: 1
            - !type:DeleteEntity
          steps:
            - tool: Screwing
              doAfter: 0.25

    - node: railingCorner
      entity: ScpRailingCornerWood
      edges:
        - to: start
          completed:
            - !type:SpawnPrototype
              prototype: ScpMaterialWoodPlank1
              amount: 2
            - !type:DeleteEntity
          steps:
            - tool: Screwing
              doAfter: 0.5

    - node: railingCornerSmall
      entity: ScpRailingCornerWoodSmall
      edges:
        - to: start
          completed:
            - !type:SpawnPrototype
              prototype: ScpMaterialWoodPlank1
              amount: 1
            - !type:DeleteEntity
          steps:
            - tool: Screwing
              doAfter: 0.25

    - node: railingRound
      entity: ScpRailingRoundWood
      edges:
        - to: start
          completed:
            - !type:SpawnPrototype
              prototype: ScpMaterialWoodPlank1
              amount: 2
            - !type:DeleteEntity
          steps:
            - tool: Screwing
              doAfter: 0.5
