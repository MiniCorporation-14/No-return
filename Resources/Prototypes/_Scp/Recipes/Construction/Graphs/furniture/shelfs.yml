- type: constructionGraph
  id: ScpShelf
  start: start
  graph:
    - node: start
      actions:
        - !type:DeleteEntity {}
      edges:
        - to: ShelfWood
          completed:
            - !type:SnapToGrid {}
          steps:
            - material: WoodPlank
              amount: 4
              doAfter: 2
        - to: ShelfRWood
          completed:
            - !type:SnapToGrid {}
          steps:
            - material: WoodPlank
              amount: 8
              doAfter: 3
            - material: Cable
              amount: 2
              doAfter: 1
        - to: ShelfBar
          completed:
            - !type:SnapToGrid {}
          steps:
            - material: WoodPlank
              amount: 6
              doAfter: 2

    - node: ShelfWood
      entity: ScpShelfWood
      edges:
        - to: start
          completed:
            - !type:EmptyAllContainers
            - !type:GivePrototype
                prototype: ScpMaterialWoodPlank1
                amount: 4
          steps:
            - tool: Prying
              doAfter: 2

    - node: ShelfRWood
      entity: ScpShelfRWood
      edges:
        - to: start
          completed:
            - !type:EmptyAllContainers
            - !type:GivePrototype
                prototype: ScpMaterialWoodPlank1
                amount: 8
            - !type:GivePrototype
                prototype: CableApcStack1
                amount: 2
          steps:
            - tool: Screwing
              doAfter: 5
            - tool: Prying
              doAfter: 2

    - node: ShelfBar
      entity: ScpShelfBar
      edges:
        - to: start
          completed:
            - !type:EmptyAllContainers
            - !type:GivePrototype
                prototype: ScpMaterialWoodPlank1
                amount: 6
          steps:
            - tool: Prying
              doAfter: 3
