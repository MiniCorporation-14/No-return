# By sillyarum, 11.05.2026
# John Grace plushies. They can play his theme when used. Credits: Grace, music: Roblox, Grace

# Black version john grace plushies.

- type: entity
  parent: BasePlushie
  id: PlushieBlackJohnGrace
  name: Обыкновенный Джон Грейс
  description: Джон Грейс в виде плюшей игрушки. Он может исполнять свою тему, когда его используют.
  components:
  - type: Sprite
    sprite: _NoReturn/Grace/BlackJohn.rsi
    state: JohnGrace
  - type: UseDelay
    delay: 120.0
  - type: EmitSoundOnUse
    sound:
      path: /Audio/_Mini14/JohnGraceTheme.ogg

- type: entity
  parent: BasePlushie
  id: PlushieBlackJohnGraceKrest
  name: Джон Грейс с крестовидными глазами
  description: Джон Грейс в виде плюшей игрушки, у него глаза крестиками. Он может исполнять свою тему, когда его используют.
  components:
  - type: Sprite
    sprite: _NoReturn/Grace/BlackJohn.rsi
    state: Johngracelover
  - type: UseDelay
    delay: 120.0
  - type: EmitSoundOnUse
    sound:
      path: /Audio/_Mini14/JohnGraceTheme.ogg

- type: entity
  parent: BasePlushie
  id: PlushieBlackJohnGraceDear
  name: Джон Грейс с красными частицами в глазах
  description: Джон Грейс в виде плюшей игрушки, как будто он в стиле нового года. Он может исполнять свою тему, когда его используют.
  components:
  - type: Sprite
    sprite: _NoReturn/Grace/BlackJohn.rsi
    state: dear
  - type: UseDelay
    delay: 120.0
  - type: EmitSoundOnUse
    sound:
      path: /Audio/_Mini14/Jinglebells2009.ogg


